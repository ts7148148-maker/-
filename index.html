<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كم باقي على نهاية التريمستا الثالثة</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>كم باقي على نهاية التريمستا الثالثة</h1>
      <p class="subtitle">2025 - 2026 🇹🇳</p>
    </div>

    <p id="message" class="tunisian-msg">يا صاحبي باقي شوية وتنتهي التريمستا</p>

    <div class="countdown">
      <div class="box">
        <span id="days">00</span>
        <small>يوم</small>
      </div>
      <div class="box">
        <span id="hours">00</span>
        <small>ساعة</small>
      </div>
      <div class="box">
        <span id="minutes">00</span>
        <small>دقيقة</small>
      </div>
      <div class="box">
        <span id="seconds">00</span>
        <small>ثانية</small>
      </div>
    </div>

    <button onclick="shareToSocial()">شارك مع صحابك على تيك توك</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
<div id="shareModal" class="share-modal">
  <div class="share-box">
    <h3>اختر صديق للمشاركة</h3>
    <ul id="friendsList">
      <li>بخانو</li>
      <li>بخنايا</li>
      <li>تيتو</li>
      <li>يوسف</li>
    </ul>
    <button onclick="closeShare()">إغلاق</button>
  </div>
</div>
<div class="trend">
  <h3>🔥 الترند</h3>
  <div class="trend-items">
    <span>#التريمستا</span>
    <span>#العطلة</span>
    <span>#امتحانات</span>
    <span>#باكالوريا</span>
  </div>
</div>
